<header>
  <div class="page-header overlay"{% if page.image %} style="background-image: url({{ page.image }})"{% endif %}>
    <div class="page-header-content">
      <div class="row">
        <div class="col-lg-7 col-md-8">
          <div class="page-header-meta">
            {% if page.category_slug and page.category_title %}
            <a href="/blog/{{ page.category_slug }}/" class="page-category-link">{{ page.category_title }}</a>
            {% endif %}
            {% if page.date %}
            <span class="date">{{ page.date | date: "%d/%m/%Y" }}</span>
            {% endif %}
            <h1>{{ page.title }}</h1>
            {% include post-share.html compact=true %}
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
