title: "Диалектическая позитивная психология"
description: "Об искусстве жить, опираясь на материалистическую диалектику и позитивную психологию"
url: "https://dial-pos-psych.github.io"
baseurl: ""
lang: ru
yandex_metrika_id: 109387183
yandex_metrika_variant: pages
timezone: Europe/Moscow
encoding: utf-8
destination: _site
markdown: kramdown
highlighter: rouge
excerpt_separator: "<!-- excerpt-disabled -->"

plugins:
  - jekyll-seo-tag

include:
  - .htaccess
  - .well-known

exclude:
  - _site
  - .venv
  - .bundle
  - .jekyll-cache
  - .jekyll-server.log
  - bash.exe.stackdump
  - .gitignore
  - .ruby-version
  - .well-known/acme-challenge
  - admin
  - auth
  - config.php
  - content-inbox
  - free-courses-mine
  - github-pages-site
  - ker-course-free
  - ker-gp
  - ker-wp
  - log
  - php
  - tmp
  - tools
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md
  - README-GITHUB-PAGES.md
  - DEVELOPER.md
  - CONTENT_WORKFLOW.md
  - recovery-report.json

collections:
  posts:
    output: true
